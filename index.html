
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unbound Workspace - Intelligent Document Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              fontFamily: {
                sans: ['Poppins', 'sans-serif'],
              },
              colors: {
                theme: {
                  bg: 'var(--color-bg)',
                  surface: 'var(--color-surface)',
                  elevated: 'var(--color-elevated)',
                  text: 'var(--color-text)',
                  muted: 'var(--color-text-muted)',
                  dim: 'var(--color-text-dim)',
                  primary: 'var(--color-primary)',
                  primaryHover: 'var(--color-primary-hover)',
                  primarySoft: 'var(--color-primary-soft)',
                  accent: 'var(--color-accent)',
                  accentHover: 'var(--color-accent-hover)',
                  border: 'var(--color-border)',
                }
              },
              animation: {
                'gradient': 'gradient 10s linear infinite',
                'pulse-gentle': 'pulse-gentle 4s ease-in-out infinite',
                'float': 'float 6s ease-in-out infinite',
                'shimmer': 'shimmer 2s linear infinite',
              },
              keyframes: {
                gradient: {
                  '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                  '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                },
                'pulse-gentle': {
                  '0%, 100%': { opacity: '0.1', transform: 'scale(1)' },
                  '50%': { opacity: '0.15', transform: 'scale(1.05)' },
                },
                float: {
                  '0%, 100%': { transform: 'translateY(0px)' },
                  '50%': { transform: 'translateY(-20px)' },
                },
                shimmer: {
                  '100%': { transform: 'translateX(100%)' },
                }
              }
            },
          },
        }
    </script>
    <style>
        :root {
            --color-bg: #F6FAF9;
            --color-surface: #FFFFFF;
            --color-elevated: #EDF5F3;
            --color-text: #102726;
            --color-text-muted: #5F7F7C;
            --color-text-dim: #8FA6A3;
            --color-primary: #3FB7A6;
            --color-primary-hover: #2EA091;
            --color-primary-soft: #DFF3EF;
            --color-accent: #F59E4C;
            --color-accent-hover: #E38A32;
            --color-border: rgba(16, 39, 38, 0.08);
        }

        .dark {
            --color-bg: #0B1413;
            --color-surface: #142423;
            --color-elevated: #1B2F2D;
            --color-text: #E6F2F1;
            --color-text-muted: #A7C2BF;
            --color-text-dim: #7C9A97;
            --color-primary: #55D6C2;
            --color-primary-hover: #6DE6D2;
            --color-primary-soft: rgba(85, 214, 194, 0.1);
            --color-accent: #FFAE5D;
            --color-accent-hover: #FFC07D;
            --color-border: rgba(230, 242, 241, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow-x: hidden;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: var(--color-elevated); }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

        .animate-fade-in-up-soft { animation: fade-in-up-soft 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        @keyframes fade-in-up-soft {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .page-flow-in {
          animation: fade-in-up-soft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
          will-change: transform, opacity;
        }

        * { transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform; transition-duration: 300ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        
        .noir-glow-teal { box-shadow: 0 0 20px rgba(63, 183, 166, 0.15); }
        .dark .noir-glow-teal { box-shadow: 0 0 30px rgba(85, 214, 194, 0.12); }
        
        .anime-card-hover:hover {
          transform: translateY(-8px) scale(1.02);
          box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .glass-panel {
          background: rgba(255, 255, 255, 0.7);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
        }

        .dark .glass-panel {
          background: rgba(20, 36, 35, 0.7);
        }

        @media (prefers-reduced-motion: reduce) {
          * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^11.11.17",
    "pdfjs-dist": "https://esm.sh/pdfjs-dist@4.10.38",
    "pdf-lib": "https://esm.sh/pdf-lib@^1.17.1",
    "jszip": "https://esm.sh/jszip@^3.10.1",
    "docx": "https://esm.sh/docx@^9.1.0",
    "pptxgenjs": "https://esm.sh/pptxgenjs@3.12.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
